# Configuración del motor H2 en memoria RAM para Spring Boot 3.5.x
spring.datasource.url=jdbc:h2:mem:minishopdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración de plataforma Hibernate y ciclo de vida de tablas
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true